<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Received Ride Requests</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <h2>Incoming Ride Requests</h2>

  <div id="requestList"></div>

  <button class="back-btn" onclick="goBack()">← Back</button>

</div>

<script src="auth.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.container {
  width: 90%;
  max-width: 800px;
  margin: auto;
  margin-top: 40px;
}

h2 {
  text-align: center;
}

/* CARD */
.request-card {
  margin-top: 15px;
  padding: 18px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
  position: relative;
}

.request-card:hover {
  transform: scale(1.02);
}

.request-card h4 {
  margin: 0;
  color: #00f7ff;
}

.request-card p {
  margin: 5px 0;
  font-size: 14px;
}

/* STATUS */
.status {
  margin-top: 8px;
  padding: 5px 10px;
  border-radius: 8px;
  font-weight: bold;
  display: inline-block;
}

.pending { background: orange; }
.accepted { background: green; }
.rejected { background: red; }

/* ACTION BUTTONS */
.action-btns {
  margin-top: 12px;
  display: flex;
  gap: 10px;
}

.btn {
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  color: white;
  font-size: 13px;
  transition: 0.3s;
}

.accept-btn {
  background: linear-gradient(135deg, #00c853, #64dd17);
}

.reject-btn {
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
}

.btn:hover {
  transform: scale(1.05);
}

/* BACK */
.back-btn {
  margin-top: 20px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #5b86e5;
  color: white;
  cursor: pointer;
}
</style>

<script>

async function loadReceivedRequests() {

  const token = localStorage.getItem("accessToken");

  if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  try {
    const response = await fetchWithAuth(
      "https://aviro-production.up.railway.app/api/ride-requests/received"
    );

    const data = await response.json();

    console.log("Received Requests:", data);

    const requests = Array.isArray(data) ? data : data.data || [];

    const container = document.getElementById("requestList");
    container.innerHTML = "";

    if (requests.length === 0) {
      container.innerHTML = "<p>No incoming requests</p>";
      return;
    }

    requests.forEach(r => {

      const requestId = r.requestId;

      let statusClass = "pending";
      if (r.status === "ACCEPTED") statusClass = "accepted";
      if (r.status === "REJECTED") statusClass = "rejected";

      const card = document.createElement("div");
      card.className = "request-card";

      card.innerHTML = `
        <h4>${r.origin} → ${r.destination}</h4>

        <p><b>Rider:</b> ${r.riderName}</p>
        <p><b>Email:</b> ${r.riderEmail}</p>
        <p><b>Request ID:</b> ${requestId}</p>

        <span class="status ${statusClass}">
          ${r.status}
        </span>

        ${
          r.status === "PENDING" ? `
          <div class="action-btns">
           <button class="btn accept-btn" id="accept-${requestId}" 
onclick="handleRequest(${requestId}, 'accept')">Accept</button>

<button class="btn reject-btn" id="reject-${requestId}" 
onclick="handleRequest(${requestId}, 'reject')">Reject</button>
          </div>
          ` : ""
        }
      `;

      container.appendChild(card);
    });

  } catch (error) {
    console.error(error);
    alert("Error loading requests");
  }
}

async function handleRequest(requestId, action) {

  if (!confirm(`Are you sure you want to ${action} this request?`)) return;
  document.getElementById(`accept-${requestId}`)?.setAttribute("disabled", true);
document.getElementById(`reject-${requestId}`)?.setAttribute("disabled", true);

  try {

    // ✅ CORRECT API URL
    const url = `https://aviro-production.up.railway.app/api/ride-requests/${requestId}/${action}`;

    const response = await fetchWithAuth(url, {
      method: "PUT"
    });

    console.log("Status:", response.status);

    if (!response.ok) {
      const errorText = await response.text();
      console.error("Error:", errorText);
      alert("Failed to update request");
      return;
    }

    const data = await response.json();
    console.log("Updated Request:", data);

    // ✅ UI FEEDBACK
    alert(`Request ${data.status}`);

    // ✅ REFRESH LIST
    loadReceivedRequests();

  } catch (error) {
    console.error("Error:", error);
    alert("Error updating request");
  }
}

function goBack() {
  window.location.href = "dashboard.html";
}

// AUTO LOAD
loadReceivedRequests();

</script>

</body>
</html>
