<!DOCTYPE html>
<html>
<head>
  <title>Signup - Aviro</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .password-container {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>

<script src="script.js"></script>

<body class="netflix-bg">

<div class="overlay"></div>

<div class="form-card">

  <img src="AVI.png" class="brand-logo">
  <h2>Create Account</h2>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">

  <!-- Password with eye -->
  <div class="password-container">
    <input id="password" type="password" placeholder="Password">
    <span class="toggle-eye" onclick="togglePassword()">👁</span>
  </div>

  <input id="phone" placeholder="Phone">

  <!-- Updated Role Dropdown -->
  <select id="role">
    <option disabled selected>Select Role</option>
    <option value="BOTH">BOTH</option>
    <option value="DRIVER">DRIVER</option>
    <option value="RIDER">RIDER</option>
  </select>

  <button onclick="registerUser()">Sign Up</button>

  <p class="small">
    Already user? <a href="login.html">Sign in</a>
  </p>

</div>

<script>
// 👁 Toggle password visibility
function togglePassword() {
  const passwordField = document.getElementById("password");
  if (passwordField.type === "password") {
    passwordField.type = "text";
  } else {
    passwordField.type = "password";
  }
}

async function registerUser() {
  const payload = {
    name: document.getElementById("name").value,
    collegeEmail: document.getElementById("email").value,
    password: document.getElementById("password").value,
    phone: document.getElementById("phone").value,
    role: document.getElementById("role").value,
    collegeId: 1
  };

  try {
    const response = await fetch("https://aviro-production.up.railway.app/api/auth/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    // ✅ store response in variable
    const data = await response.json();

    // ✅ log full response
    console.log("Full Response:", data);

    if (response.ok) {
      alert("Registration Successful!");

      // ✅ store everything in browser
      localStorage.setItem("userData", JSON.stringify(data));
      localStorage.setItem("accessToken", data.accessToken);
      localStorage.setItem("refreshToken", data.refreshToken);

      window.location.href = "login.html";
    } else {
      alert(data.message || "Registration Failed");
    }

  } catch (error) {
    console.error("Error:", error);
    alert("Server error");
  }
}
</script>

</body>
</html>
