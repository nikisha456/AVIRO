<!DOCTYPE html>
<html>
<head>
  <title>Login - Aviro</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .password-container {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>

<body class="netflix-bg">

<div class="overlay"></div>

<div class="form-card">

  <img src="AVI.png" class="brand-logo">
  <h2>Sign In</h2>

  <input id="loginEmail" placeholder="Email">

  <div class="password-container">
    <input id="loginPassword" type="password" placeholder="Password">
    <span class="toggle-eye" onclick="toggleLoginPassword()">👁</span>
  </div>

  <button onclick="loginUser()">Sign In</button>

  <div class="row">
    <label><input type="checkbox"> Remember me</label>
    <span>Need help?</span>
  </div>

  <p class="small">
    New to Aviro? <a href="signup.html">Sign up now</a>
  </p>

</div>

<script>

function toggleLoginPassword() {
  const passwordField = document.getElementById("loginPassword");
  passwordField.type =
    passwordField.type === "password" ? "text" : "password";
}

async function loginUser() {
  const payload = {
    collegeEmail: document.getElementById("loginEmail").value,
    password: document.getElementById("loginPassword").value
  };

  try {
    const response = await fetch("https://aviro-production.up.railway.app/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const result = await response.json();
    console.log("Login Response:", result);

    if (response.ok) {
      alert("Login Successful!");

      localStorage.setItem("userData", JSON.stringify(result));
      localStorage.setItem("accessToken", result.accessToken);
      localStorage.setItem("refreshToken", result.refreshToken);

      await refreshTokenAPI(result.refreshToken);

      window.location.href = "dashboard.html";
    } else {
      alert(result.message || "Invalid credentials");
    }

  } catch (error) {
    console.error("Login Error:", error);
    alert("Server error");
  }
}

async function refreshTokenAPI(refreshToken) {
  try {
    const response = await fetch("https://aviro-production.up.railway.app/api/auth/refresh", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Refresh-Token": refreshToken
      }
    });

    const data = await response.json();
    console.log("Refresh Token Response:", data);

    if (response.ok && data.accessToken) {
      localStorage.setItem("accessToken", data.accessToken);
    }

  } catch (error) {
    console.error("Refresh API Error:", error);
  }
}
</script>

</body>
</html>
