<!DOCTYPE html>
<html>
<head>
  <title>Add Vehicle - Aviro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="netflix-bg">

<div class="overlay"></div>

<div class="form-card">

  <h2>Add Vehicle</h2>

  <!-- Vehicle Type -->
  <label>Vehicle Type:</label>
  <div class="row">
    <label>
      <input type="radio" name="type" value="CAR"> CAR
    </label>
    <label>
      <input type="radio" name="type" value="BIKE"> BIKE
    </label>
  </div>

  <!-- Registration Number -->
  <input id="regNumber" placeholder="Registration Number (e.g. MH12AB4532)">

  <!-- Model -->
  <input id="model" placeholder="Vehicle Model">

  <!-- Seats -->
  <input id="seats" type="number" placeholder="Seats Available">

  <button class="neon-btn" onclick="addVehicle()">
  Add Vehicle
</button>
  
  <p class="small">
    Go back to <a href="dashboard.html">Dashboard</a>
  </p>

</div>

<script>

   /** function addVehicle() {
  console.log("BUTTON CLICKED"); } // 👈 ADD THIS **/
async function addVehicle() {

  const selectedType = document.querySelector('input[name="type"]:checked');

  if (!selectedType) {
    alert("Please select vehicle type");
    return;
  }

  const data = {
    type: selectedType.value.toUpperCase(),
    registrationNumber: document.getElementById("regNumber").value.toUpperCase(),
    model: document.getElementById("model").value,
    seatsAvailable: parseInt(document.getElementById("seats").value)
  };

  const token = localStorage.getItem("accessToken");

  if (!token) {
    alert("Please login first!");
    window.location.href = "login.html";
    return;
  }

  try {
    const response = await fetch("https://aviro-production.up.railway.app/api/vehicles", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(data)
    });

    let result;
    try {
      result = await response.json();
    } catch {
      result = {};
    }

    if (response.ok) {
      alert("Vehicle added successfully!");
      window.location.href = "dashboard.html";
    } else {
      alert(result.message || "Failed to add vehicle");
    }

  } catch (error) {
    console.error(error);
    alert("Server error");
  }
} 
</script>

</body>
</html>
