<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ride Details - Aviro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <h2>Ride Details</h2>

  <div id="rideDetails"></div>

  <button class="back-btn" onclick="goBack()">← Back to Search</button>
   
</div>
<script src="auth.js"></script>
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.container {
  width: 90%;
  max-width: 700px;
  margin: auto;
  margin-top: 40px;
}

.ride-card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
}

button {
  margin-top: 20px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ff416c;
  color: white;
  cursor: pointer;
}
</style>

<script>

function getRideIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadRideDetails() {

  const rideIdFromURL = getRideIdFromURL();
  const token = localStorage.getItem("accessToken");

  if (!rideIdFromURL) {
    alert("Invalid Ride ID");
    return;
  }

  try {
    const response = await fetch(`https://aviro-production.up.railway.app/api/rides/${rideIdFromURL}`, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token   // ✅ ANY TOKEN WORKS
      }
    });

    console.log("Status:", response.status);

    if (!response.ok) {
      throw new Error("Failed to fetch ride");
    }

    const r = await response.json();
    console.log("Ride Data:", r);
    const dt = new Date(r.departureTime);

    const date =
      dt.getFullYear() + "-" +
      String(dt.getMonth()+1).padStart(2,'0') + "-" +
      String(dt.getDate()).padStart(2,'0');

    const container = document.getElementById("rideDetails");
    const rideId = r.id || r.rideId || "N/A";
const vehicleId = r.vehicleId || (r.vehicle && r.vehicle.id) || "N/A";

   container.innerHTML = `
  <div class="ride-card">
    <h3>${r.origin} → ${r.destination}</h3>
    <p><b>Ride ID:</b> ${rideId}</p>
    <p><b>Date:</b> ${date}</p>
    <p><b>Time:</b> ${dt.toLocaleTimeString()}</p>
    <p><b>Seats Available:</b> ${r.availableSeats}</p>
    <p><b>Price per Seat:</b> ₹${r.pricePerSeat}</p>
    <p><b>Vehicle ID:</b> ${vehicleId}</p>

    <button onclick="goToCancel(${rideId})">Cancel Ride</button>
    <button id="requestBtn" onclick="requestRide(${rideId})">Request Ride</button>
    
  </div>
`;

  } catch (error) {
    console.error(error);
    alert("Error loading ride details");
  }
}

function goBack() {
  window.location.href = "search-rides.html";
}
function goToCancel(id) {
  window.location.href = `cancel-ride.html?id=${id}`;
}

async function requestRide(rideId) {

  const token = localStorage.getItem("accessToken");

  if (!token) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  try {
    const response = await fetchWithAuth(
      `https://aviro-production.up.railway.app/api/ride-requests/${rideId}`,
      {
        method: "POST"
      }
    );

    console.log("Status:", response.status);

    if (response.ok) {
      document.getElementById("requestBtn").disabled = true;
document.getElementById("requestBtn").innerText = "Requested";
      alert("Ride request sent successfully");
    } 
    else if (response.status === 403) {
      alert("Only RIDER/BOTH can request rides");
    } 
    else {
      alert("Failed to send request");
    }

  } catch (error) {
    console.error(error);
    alert("Error sending request");
  }
}
// load on page open
loadRideDetails();

</script>

</body>
</html>
