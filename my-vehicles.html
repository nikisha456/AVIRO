<!DOCTYPE html>
<html>
<head>
  <title>My Vehicles - Aviro</title>
  <link rel="stylesheet" href="style.css">
<script src="auth.js"></script>
  <style>
    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      margin-top: 40px;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .count-box {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
    }

    .vehicle-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .vehicle-card:hover {
      transform: scale(1.02);
    }

    .vehicle-card h3 {
      margin: 0;
      color: #ff4b2b;
    }

    .vehicle-card p {
      margin: 5px 0;
      font-size: 14px;
    }

    .back-btn {
      margin-top: 20px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #e50914;
      color: white;
      cursor: pointer;
    }
    .vehicle-card {
  position: relative; /* important for button positioning */
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.vehicle-card:hover {
  transform: scale(1.02);
}


  </style>
</head>

<body class="netflix-bg">

<div class="overlay"></div>

<div class="container">

  <div class="header">
    <h2> My Vehicles</h2>
    <div class="count-box">
      Total: <span id="vehicleCount">0</span>
    </div>
  </div>

  <div id="vehicleList"></div>

  <button class="back-btn" onclick="goBack()">Back to Dashboard</button>

</div>

<script>

async function loadVehicles() {

  const token = localStorage.getItem("accessToken");

  if (!token) {
    alert("Please login first!");
    window.location.href = "login.html";
    return;
  }

  try {
    const response = await fetch("https://aviro-production.up.railway.app/api/vehicles/my-vehicles", {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await response.json();

    console.log("Vehicles:", data);

    // If API returns array directly
    const vehicles = Array.isArray(data) ? data : data.data || [];

    // Set count
    document.getElementById("vehicleCount").innerText = vehicles.length;

    const container = document.getElementById("vehicleList");
    container.innerHTML = "";

    if (vehicles.length === 0) {
      container.innerHTML = "<p>No vehicles added yet.</p>";
      return;
    }

    vehicles.forEach(v => {
  const card = document.createElement("div");
  card.className = "vehicle-card";

 const vehicleId = v.id || v.vehicleId || (v.vehicle && v.vehicle.id);
 console.log("Vehicle ID:", vehicleId);

card.innerHTML = `
  
  <h3>${v.type}</h3>
  <p><b>Reg No:</b> ${v.registrationNumber}</p>
  <p><b>Model:</b> ${v.model}</p>
  <p><b>Seats:</b> ${v.seatsAvailable}</p>
`;

  container.appendChild(card);
});


  } catch (error) {
    console.error(error);
    alert("Failed to load vehicles");
  }
}

function goBack() {
  window.location.href = "dashboard.html";
}

// Load data when page opens
loadVehicles();


</script>

</body>
</html>
