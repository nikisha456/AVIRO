<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Rides - Aviro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <h2>Search Rides</h2>

  <!-- SEARCH FORM -->
  <div class="search-box">
    <input type="text" id="origin" placeholder="Enter Origin (e.g. Karve)">
    <input type="text" id="destination" placeholder="Enter Destination (e.g. MIT)">
    <input type="date" id="date">  <!-- ✅ ALWAYS RETURNS YYYY-MM-DD -->

    <button onclick="searchRides()">Search</button>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>

  <!-- BACK BUTTON -->
  <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

</div>
<script src="auth.js"></script>
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.container {
  width: 90%;
  max-width: 800px;
  margin: auto;
  margin-top: 40px;
}

h2 {
  text-align: center;
}

.search-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #5b86e5;
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.ride-card {
  margin-top: 15px;
  padding: 18px;
  border-radius: 15px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

.ride-card:hover {
  transform: scale(1.02);
}

/* HEADER (TITLE + BUTTON) */
.ride-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ride-header h4 {
  margin: 0;
  color: #ffffff;
}

/* BUTTON RIGHT SIDE */
.ride-header button {
  background: linear-gradient(135deg, #36d1dc, #5b86e5);
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

/* BODY GRID */
.ride-body {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  font-size: 14px;
}

.back-btn {
  margin-top: 20px;
  background: #ff416c;
}
</style>

<script>

async function searchRides() {

  const origin = document.getElementById("origin").value.trim();
  const destination = document.getElementById("destination").value.trim();
  const dateInput = document.getElementById("date").value;

  if (!origin || !destination || !dateInput) {
    alert("Please fill all fields");
    return;
  }

  // ✅ FORCE YYYY-MM-DD FORMAT
  const d = new Date(dateInput);
  const formattedDate =
    d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, '0') + "-" +
    String(d.getDate()).padStart(2, '0');

  // ✅ TOKEN (ANY ROLE WORKS)
  const token = localStorage.getItem("accessToken");

  const url = `https://aviro-production.up.railway.app/api/rides/search?origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&date=${formattedDate}`;

  console.log("API:", url);

  try {
    const response = await fetch(url, {
      method: "GET",
      headers: {
        "Authorization": "Bearer " + token   // ✅ TOKEN ADDED
      }
    });

    console.log("Status:", response.status);

    if (!response.ok) {
      throw new Error("Error " + response.status);
    }

    const data = await response.json();
    const rides = Array.isArray(data) ? data : data.data || [];

    const container = document.getElementById("results");
    container.innerHTML = "";

    if (rides.length === 0) {
      container.innerHTML = "<p>No rides found</p>";
      return;
    }

    rides.forEach(r => {

  const rideId = r.id || r.rideId;

  const card = document.createElement("div");
  card.className = "ride-card";

  card.innerHTML = `
    <div class="ride-header">
      <h4>${r.origin} → ${r.destination}</h4>
      <button onclick="viewRide(${rideId})">View Details</button>
    </div>

    <div class="ride-body">
      <p><b>Date:</b> ${new Date(r.departureTime).toLocaleDateString()}</p>
      <p><b>Time:</b> ${new Date(r.departureTime).toLocaleTimeString()}</p>
      <p><b>Seats:</b> ${r.availableSeats}</p>
      <p><b>Price:</b> ₹${r.pricePerSeat}</p>
      <p><b>Ride ID:</b> ${rideId}</p>
    </div>
  `;

  container.appendChild(card);
});
    

  } catch (error) {
    console.error(error);
    alert("Error fetching rides");
  }
}

function goBack() {
  window.location.href = "dashboard.html";
}
function viewRide(id) {
  console.log("Selected Ride ID:", id);
  window.location.href = `ride-details.html?id=${id}`;
}
</script>

</body>
</html>
